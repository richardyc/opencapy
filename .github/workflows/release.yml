name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew formula
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"

          # Parse SHA256 values from the checksums file goreleaser produced
          SUMS_FILE="dist/checksums.txt"
          sha_darwin_amd64=$(grep "opencapy_darwin_amd64.tar.gz" "$SUMS_FILE" | awk '{print $1}')
          sha_darwin_arm64=$(grep "opencapy_darwin_arm64.tar.gz" "$SUMS_FILE" | awk '{print $1}')
          sha_linux_amd64=$(grep  "opencapy_linux_amd64.tar.gz"  "$SUMS_FILE" | awk '{print $1}')
          sha_linux_arm64=$(grep  "opencapy_linux_arm64.tar.gz"  "$SUMS_FILE" | awk '{print $1}')

          BASE="https://github.com/richardyc/opencapy/releases/download/${TAG}"

          cat > Formula/opencapy.rb <<FORMULA
          # typed: false
          # frozen_string_literal: true

          class Opencapy < Formula
            desc "Your machines, mirrored. Code from anywhere."
            homepage "https://opencapy.dev"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.intel?
                url "${BASE}/opencapy_darwin_amd64.tar.gz"
                sha256 "${sha_darwin_amd64}"

                define_method(:install) do
                  bin.install "opencapy"
                end
              end
              if Hardware::CPU.arm?
                url "${BASE}/opencapy_darwin_arm64.tar.gz"
                sha256 "${sha_darwin_arm64}"

                define_method(:install) do
                  bin.install "opencapy"
                end
              end
            end

            on_linux do
              if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
                url "${BASE}/opencapy_linux_amd64.tar.gz"
                sha256 "${sha_linux_amd64}"
                define_method(:install) do
                  bin.install "opencapy"
                end
              end
              if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
                url "${BASE}/opencapy_linux_arm64.tar.gz"
                sha256 "${sha_linux_arm64}"
                define_method(:install) do
                  bin.install "opencapy"
                end
              end
            end

            test do
              system "#{bin}/opencapy", "--help"
            end
          end
          FORMULA

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="chore/formula-${TAG}"
          git checkout -b "$BRANCH"
          git add Formula/opencapy.rb
          git commit -m "chore: bump Homebrew formula to ${TAG}"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: bump Homebrew formula to ${TAG}" \
            --body "Auto-generated by the release workflow." \
            --base main \
            --head "$BRANCH"
