name = "opencapy-relay"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Smart Placement routes each Worker invocation to the nearest Cloudflare PoP
# (Hong Kong, Singapore, Tokyo, etc. for Asian users) rather than a fixed region.
[placement]
mode = "smart"

[[durable_objects.bindings]]
name = "RELAY"
class_name = "RelayRoom"

[[migrations]]
tag = "v1"
new_classes = ["RelayRoom"]

[observability]
enabled = true
